name: Wiki Health Check

# Karpathy-style "lint" pass over the knowledge wiki. Weekly (and on demand),
# Claude audits skills/ + knowledge/ for integrity — broken [[wikilinks]],
# inconsistencies, stale/duplicate articles, a drifted INDEX, and gaps worth a
# new article — and opens a `self-improve` PR with fixes. The PR runs through the
# same review pipeline (scope-guard + secret-scan + tests + Claude review +
# auto-merge).
#
# Gated by SELF_IMPROVE_ENABLED + ANTHROPIC_API_KEY.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: wiki-health
  cancel-in-progress: true

jobs:
  health-check:
    if: vars.SELF_IMPROVE_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Claude — health-check the wiki
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are SamurAI's wiki health-check (lint) agent. Audit the committed
            knowledge wiki for integrity and fix issues.

            Review skills/*/SKILL.md and knowledge/*.md (+ knowledge/INDEX.md):
              - Broken or dangling [[wikilinks]] (links to non-existent articles).
              - INDEX.md out of sync with the actual articles.
              - Inconsistent or contradictory facts across articles.
              - Stale content contradicted by the current codebase/CLAUDE.md
                (apply the facts-only rule — verify against the repo).
              - Duplicate/overlapping articles that should be merged.
              - Obvious gaps worth a new article (use WebSearch to enrich if it
                genuinely helps); add backlinks to connect related articles.

            STRICT SCOPE — edit ONLY skills/**, knowledge/**, tests/**. Never
            write secrets or verbatim PII. Keep articles concise and grounded.

            Then run `python -m pytest tests/test_wiki.py tests/test_skills.py -q`
            (must pass), create branch wiki-health/<slug>, commit, push, and open a
            PR with `gh pr create` labeled `self-improve` summarizing the fixes.
            If the wiki is already healthy, do NOT open a PR — say so.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 40
            --allowedTools "Read,Edit,Write,Glob,Grep,WebSearch,WebFetch,Bash(git:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(python:*),Bash(python -m pytest:*),Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(wc:*)"
