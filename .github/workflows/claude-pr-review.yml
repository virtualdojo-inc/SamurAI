name: Self-Improve PR Review

# Reviews autonomous self-improvement PRs (label `self-improve`) and, on Claude
# approval + green CI + in-scope changes + clean secret scan, auto-merges them.
# Merge to main then triggers the deploy workflow (blue/green, health-gated,
# auto-rollback).
#
# Gates (all must pass before merge):
#   1. scope-guard  — diff limited to skills/**, knowledge/**, tests/**
#   2. secret-scan  — no credentials/PII leaked from conversations into the wiki
#   3. test         — full pytest suite
#   4. review       — Claude reviews; only an explicit approval marker auto-merges
# Human-authored PRs (no `self-improve` label) are NOT auto-merged here.

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  scope-guard:
    if: contains(github.event.pull_request.labels.*.name, 'self-improve')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce change scope (skills/, knowledge/, tests/ only)
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          FILES=$(git diff --name-only "$BASE"...HEAD)
          echo "Changed files:"; echo "$FILES"
          BAD=$(echo "$FILES" | grep -vE '^(skills/|knowledge/|tests/)' || true)
          if [ -n "$BAD" ]; then
            echo "::error::Self-improve PR touches files outside the allowlist (skills/, knowledge/, tests/):"
            echo "$BAD"
            exit 1
          fi
          echo "Scope OK."

  secret-scan:
    needs: scope-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan added lines for leaked secrets / credentials
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          # Only inspect ADDED lines in this PR.
          ADDED=$(git diff "$BASE"...HEAD --unified=0 | grep -E '^\+' | grep -vE '^\+\+\+' || true)
          # High-signal credential patterns. Conservative — these should never
          # appear in a distilled wiki.
          PATTERNS='(AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30,}|gho_[A-Za-z0-9]{30,}|github_pat_[A-Za-z0-9_]{30,}|sk-ant-[A-Za-z0-9-]{20,}|AIza[0-9A-Za-z_-]{30,}|-----BEGIN [A-Z ]*PRIVATE KEY-----|xox[baprs]-[A-Za-z0-9-]{10,}|eyJ[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{20,}\.[A-Za-z0-9_-]{10,})'
          if echo "$ADDED" | grep -EnH "$PATTERNS" 2>/dev/null; then
            echo "::error::Potential secret/credential detected in added lines — blocking merge."
            exit 1
          fi
          echo "Secret scan clean."

  test:
    needs: scope-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -q

  review:
    needs: [test, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude — review the self-improvement PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this self-improvement PR for SamurAI. It should make focused,
            well-justified updates to the wiki (skills/ and/or knowledge/),
            distilled from recent conversations.

            Check:
              - Change is limited to skills/**, knowledge/**, tests/** (scope-guard
                enforces this; confirm the intent).
              - Skill frontmatter valid (name [a-z0-9-] <=64 chars; non-empty
                third-person description <=1024; no 'anthropic'/'claude').
                Knowledge frontmatter valid (non-empty title + summary; sensible
                [[wikilinks]]; INDEX.md updated to match new/renamed articles).
              - Guidance/knowledge is accurate and grounded (facts-only) — no
                speculation, no fabricated steps; consistent with CLAUDE.md.
              - NO secrets, credentials, or verbatim customer PII were written into
                the wiki (the secret-scan gate also checks, but confirm).
              - Tests cover the change and are meaningful.

            If it is correct, safe, and a genuine improvement, post a PR comment
            containing exactly the marker `SELF_IMPROVE_APPROVED` plus a short
            rationale. Otherwise, request changes with specific, actionable
            comments and do NOT include that marker.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
            --allowedTools "Read,Glob,Grep,Bash(git:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh pr review:*)"

      - name: Auto-merge on approval
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if gh pr view "$PR" --json comments -q '.comments[].body' | grep -q "SELF_IMPROVE_APPROVED"; then
            echo "Claude approved. Enabling auto-merge (merges once all checks are green)."
            gh pr review "$PR" --approve
            gh pr merge "$PR" --squash --auto --delete-branch
          else
            echo "No approval marker found — leaving PR open for revision."
            exit 1
          fi
