name: Deploy to Cloud Run

# Build the container and deploy to Cloud Run on every push to main.
# Tests are a hard gate: deploy only runs if the suite passes.
# Auth is keyless via Workload Identity Federation (no stored SA key).

on:
  push:
    branches: [main]
    # Skip deploys for docs-only / CI-only changes.
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ vars.GCP_SERVICE }}" \
            --source . \
            --region "${{ vars.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT }}" \
            --quiet
